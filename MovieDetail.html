<!DOCTYPE html>
<html lang="vi">

<!-- SECTION: Document head and movie detail assets -->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AnimeHay - Chi tiết phim</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- CSS -->
  <link rel="stylesheet" href="src/CSS/MovieDetail.css" />
</head>

<body>
  <!-- SECTION: Movie detail navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark detail-navbar">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="Home.html">
        <i class="bi bi-play-btn-fill text-danger fs-3 me-2"></i>
        <span class="fw-bold text-danger">Anime</span><span class="fw-bold text-primary">Hay</span>
      </a>

      <a class="btn btn-outline-light btn-sm" href="Home.html#movie_list">
        <i class="bi bi-arrow-left me-1"></i>
        Quay lại
      </a>
    </div>
  </nav>

  <!-- SECTION: Movie detail content -->
  <main class="movie-detail-page">
    <section class="movie-detail" id="movieDetail">
      <div class="movie-detail-poster">
        <img id="detailPoster" src="" alt="Poster phim">
        <span class="detail-rating" id="detailRating"></span>
      </div>

      <div class="movie-detail-info">
        <span class="detail-badge" id="detailStatus"></span>
        <h1 id="detailTitle">Chi tiết phim</h1>
        <p class="detail-category" id="detailCategory"></p>

        <div class="detail-meta">
          <span><i class="bi bi-calendar3"></i> <span id="detailYear"></span></span>
          <span><i class="bi bi-star-fill"></i> <span id="detailRatingText"></span></span>
          <span><i class="bi bi-camera-reels"></i> Movie</span>
        </div>

        <div class="detail-description">
          <h2>Mô tả phim</h2>
          <p id="detailDescription"></p>
        </div>

        <div class="detail-actions">
          <a class="btn btn-danger btn-lg d-none" id="detailMovieLink" href="#" target="_blank" rel="noopener">
            <i class="bi bi-play-fill me-1"></i>
            Xem phim
          </a>
          <a class="btn btn-outline-light btn-lg" href="Home.html#movie_list">
            <i class="bi bi-collection-play me-1"></i>
            Danh sách phim
          </a>
        </div>
      </div>
    </section>

    <section class="movie-not-found d-none" id="movieNotFound">
      <h1>Không tìm thấy phim</h1>
      <p>không tìm thấy thông tin phim.</p>
      <a class="btn btn-danger" href="Home.html#movie_list">Quay lại danh sách phim</a>
    </section>
  </main>

  <!-- SECTION: External libraries and movie detail scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Core Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <!-- Auth -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <!-- Firestore -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <!-- Firebase Config -->
  <script src="src/JS/firebase_config.js"></script>
  <!-- JS-logic -->
  <script src="src/JS/MovieDetail.js"></script>
</body>

</html>
