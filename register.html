<!DOCTYPE html>
<html lang="en">

<!-- SECTION: Document head and register assets -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- lINK CSS BOOTSTRAP -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

    <link rel="stylesheet" href="src/CSS/register.CSS">

</head>

<body>

    <!-- SECTION: Register card container -->
    <div class="auth_container">
        <!-- SECTION: Register logo and title -->
        <!-- Header -->
        <div class="text-center">
            <!-- Logo -->
            <a>
                <i class="bi bi-play-btn-fill text-danger fs-4"></i>
                <span class="fw-bold text-danger fs-4">Anime</span><span class="fw-bold text-primary fs-4">Hay</span>
            </a>

            <h4 class="text-primary py-4">Đăng Ký</h4>

        </div>
        <!-- SECTION: Register form -->
        <!-- Form -->
        <form action="" id="register-form">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" placeholder="Username">
                <label for="floatingInput">Username</label>
            </div>

            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" placeholder="name@example.com">
                <label for="floatingInput">Email address</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" placeholder="Password">
                <label for="floatingPassword">Password</label>
            </div>

            <div class="form-floating">
                <input type="password" class="form-control" id="confirm-password" placeholder="ConfirmPassword">
                <label for="floatingPassword">ConfirmPassword</label>
            </div>

            <div class="mt-3">
                <button class="btn btn-primary w-100 btn-lg" type="submit">Đăng Ký</button>
            </div>
        </form>

        <!-- Đăng Ký -->
        <!-- SECTION: Login redirect link -->
        <div class="text-center mt-3">
            <span class="text-white">Bạn đã có tài khoản ?</span>
            <a class="text-decoration-none fw-bold" href="login.html">Đăng nhập</a>
        </div>
    </div>

    </div>



    <!-- SECTION: External libraries and register scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- Core Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <!-- Auth -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <!-- Firestore -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <!-- Firebase Config -->
    <script src="src/JS/firebase_config.js"></script>
    <!-- JS-logic -->
    <script src="src/JS/register.js"></script>

</body>

</html>
